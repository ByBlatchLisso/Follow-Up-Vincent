<style>
:root{
  --navy:#1F2D50; --blue:#2E5AAC; --gold:#C9A24D; --gold-light:#F4E9D3;
  --cream:#FBF8F2; --sand:#F2EEE3; --hairline:#DAD6CC; --sage:#7C9473;
  --sage-light:#EAF0E7; --coral:#B85C3E; --coral-light:#F7EAE3; --gray:#5C5A54;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--sand); color:var(--navy);
  padding-bottom:56px; -webkit-tap-highlight-color:transparent;
}
h1,h2,h3{margin:0; font-weight:700;}
.header{
  background:var(--navy); color:#fff; padding:14px 16px 10px;
  position:sticky; top:0; z-index:20;
  padding-top:calc(14px + env(safe-area-inset-top));
}
.header .kicker{font-size:11px; letter-spacing:.08em; color:var(--gold); font-weight:600; text-transform:uppercase;}
.header h1{font-size:20px; margin-top:2px;}
.header .sub{font-size:12px; color:#c9d0e0; margin-top:2px;}
.daypicker{margin-top:8px;}
.daypicker select{
  width:100%; padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08); color:#fff; font-size:14px; font-weight:600;
}
.daypicker select option{color:#000;}
.tabs{
  display:flex; position:sticky; top:0; z-index:19; background:var(--navy);
  border-bottom:2px solid var(--gold);
}
.tabs button{
  flex:1; padding:10px 6px; background:none; border:none; color:#c9d0e0;
  font-size:14px; font-weight:600; font-family:inherit;
}
.tabs button.active{color:#fff; box-shadow:inset 0 -3px 0 var(--gold);}
main{padding:12px;}
.section{
  background:#fff; border-radius:14px; margin-bottom:12px; overflow:hidden;
  border:1px solid var(--hairline);
}
.section-head{
  padding:10px 14px; font-size:13px; font-weight:700; letter-spacing:.02em;
  border-left:4px solid var(--gold); background:var(--cream); color:var(--navy);
}
.section-head.blue{border-left-color:var(--blue); background:#EEF2FA;}
.section-head.sage{border-left-color:var(--sage); background:var(--sage-light);}
.section-head.coral{border-left-color:var(--coral); background:var(--coral-light);}
.section-body{padding:10px 14px 14px;}
.mantra{
  background:var(--gold-light); border:1.4px solid var(--gold); border-radius:16px;
  padding:16px; text-align:center; margin-bottom:12px;
}
.mantra .icon{
  width:40px; height:40px; margin:0 auto 6px; border-radius:50%; background:var(--gold);
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px;
}
.mantra .label{font-size:10px; letter-spacing:.1em; color:var(--gold); font-weight:700; text-transform:uppercase;}
.mantra .quote{font-size:19px; font-weight:700; font-style:italic; color:var(--navy); margin:4px 0 8px;}
.mantra .meta{font-size:11px; color:var(--gray); line-height:1.5;}
.row{display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--hairline);}
.row:last-child{border-bottom:none;}
.row .time{flex:0 0 78px; font-weight:700; font-size:12px; color:var(--blue);}
.row .content{flex:1;}
.row .activity{font-weight:600; font-size:14px;}
.row .note{font-size:12px; color:var(--gray); margin-top:2px; line-height:1.4;}
.check{display:flex; align-items:center; gap:10px; padding:7px 0;}
.check input{width:19px; height:19px; accent-color:var(--sage); flex:0 0 auto;}
.check label{font-size:13.5px; flex:1;}
.check.done label{color:var(--gray); text-decoration:line-through;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:0 14px;}
@media (max-width:420px){.grid2{grid-template-columns:1fr;}}
.pill{display:inline-block; font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  color:var(--sage); background:var(--sage-light); border-radius:6px; padding:2px 7px; margin-bottom:4px;}
.card{border:1px solid var(--hairline); border-radius:10px; padding:10px 12px; margin-bottom:10px; background:var(--cream);}
.card h4{font-size:13.5px; margin-bottom:4px;}
.card p{font-size:12px; color:var(--gray); margin:0; line-height:1.5;}
textarea{
  width:100%; min-height:80px; border:1px solid var(--hairline); border-radius:10px;
  padding:10px; font-family:inherit; font-size:13px; resize:vertical; background:#fff;
}
input[type=text].prio{
  width:100%; border:none; border-bottom:1.5px solid var(--hairline); padding:8px 2px;
  font-size:14px; font-family:inherit; background:transparent;
}
input[type=text].prio:focus{outline:none; border-color:var(--gold);}
.prio-row{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
.prio-row .num{flex:0 0 18px; font-weight:700; color:var(--gold); font-size:14px;}
table{width:100%; border-collapse:collapse; font-size:12.5px;}
table th{background:var(--navy); color:#fff; text-align:left; padding:6px 8px; font-size:11px;}
table td{padding:6px 8px; border-bottom:1px solid var(--hairline); vertical-align:top;}
table tr:nth-child(even) td{background:var(--cream);}
.small{font-size:11.5px; color:var(--gray);}
.badge{display:inline-block; background:var(--navy); color:#fff; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700;}
.empty{color:var(--gray); font-size:13px; font-style:italic; padding:6px 0;}
footer.app-footer{text-align:center; font-size:10.5px; color:var(--gray); padding:18px 12px 8px;}

/* --- Todo tab : tableau type Excel, épuré --- */
.tfilters{display:flex; gap:6px; margin-bottom:10px; overflow-x:auto; -webkit-overflow-scrolling:touch;}
.tfilters button{
  flex:0 0 auto; padding:6px 13px; border-radius:99px; border:1px solid var(--hairline);
  background:#fff; color:var(--gray); font-family:inherit; font-size:12px; font-weight:600;
}
.tfilters button.active{background:var(--navy); color:#fff; border-color:var(--navy);}
.ttable-wrap{background:#fff; border:1px solid var(--hairline); border-radius:14px; overflow:hidden; margin-bottom:12px;}
.ttable{width:100%; border-collapse:collapse; font-size:12.5px; table-layout:fixed;}
.ttable th{
  background:var(--navy); color:#fff; text-align:left; padding:8px 5px;
  font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
}
.ttable th.h-done{width:28px;}
.ttable th.h-pr{width:62px;}
.ttable th.h-st{width:72px;}
.ttable th.h-com{width:24%;}
@media (max-width:520px){
  .ttable th.h-com{width:70px;}
  .ttable th.h-pr{width:46px;}
  .ttable th.h-st{width:52px;}
  .ttable th{padding:8px 3px; font-size:9px;}
  .ttable td{padding:7px 3px;}
  .ttable .t-task{font-size:12px;}
}
.ttable input.t-com{
  width:100%; border:none; border-bottom:1px dashed var(--hairline); background:transparent;
  font-family:inherit; font-size:11px; color:var(--gray); padding:3px 0;
}
.ttable input.t-com:focus{outline:none; border-bottom:1.5px solid var(--gold); color:var(--navy);}
.ttable td{padding:7px 5px; border-bottom:1px solid var(--hairline); vertical-align:middle; overflow:hidden;}
.ttable tr:last-child td{border-bottom:none;}
.ttable td.c-done{padding-right:0; padding-left:7px;}
.ttable td.c-done input{width:18px; height:18px; accent-color:var(--sage);}
.ttable .t-task{font-weight:600; font-size:12.5px; line-height:1.3; word-wrap:break-word;}
.ttable tr.done .t-task{color:var(--gray); text-decoration:line-through; font-weight:400;}
.ttable .t-sub{font-size:10px; color:var(--gray); margin-top:1px;}
.ttable .t-ech{font-size:10px; font-weight:700; color:var(--coral);}
.ttable .t-ech.urgent{background:var(--coral); color:#fff; border-radius:6px; padding:1px 5px;}
.ttable select{
  border:none; background:transparent; font-family:inherit; font-size:10.5px; font-weight:700;
  padding:2px 0; width:100%; -webkit-appearance:none; appearance:none;
  white-space:nowrap; text-overflow:ellipsis; color:var(--navy);
}
.ttable select.sel-Haute{color:var(--coral);}
.ttable select.sel-Moyenne{color:#A07E2C;}
.ttable select.sel-Basse{color:#8A93A8;}
.trow-detail td{background:var(--cream); padding:10px 12px;}
.trow-detail textarea{min-height:44px; font-size:12px;}
.trow-detail .advice{font-size:11.5px; color:var(--blue); line-height:1.45; margin-top:6px;}
.addbar{display:flex; gap:6px; margin-bottom:10px;}
.addbar input[type=text]{
  flex:1; padding:9px 12px; border:1px solid var(--hairline); border-radius:10px;
  font-family:inherit; font-size:13px; background:#fff;
}
.addbar button{
  flex:0 0 auto; background:var(--navy); color:#fff; border:none; border-radius:10px;
  padding:9px 16px; font-family:inherit; font-size:13px; font-weight:700;
}
.tcount{font-size:11px; color:var(--gray); margin:2px 2px 8px;}
</style>
</head>

_sport": "Haltères réglables — gauche fixé à 8 kg, droite fixée à 13 kg (+4 kg de disques disponibles à répartir), barre de traction/dips (T), poignées de pompes, tapis de sol, gourde d'eau à portée.", "repos_sport": "20-30 sec de repos entre chaque exercice ; 60-90 sec (boxe à l'ombre) entre les tours.", "courses_semaine": [["Protéines", "Poulet (blanc)", "1 kg"], ["Protéines", "Bœuf haché / steak", "600 g"], ["Protéines", "Escalope de dinde", "300 g"], ["Protéines", "Œufs", "18"], ["Protéines", "Whey", "1 boîte (dose quotidienne)"], ["Protéines", "Yaourt protéiné (parfums variés)", "7 pots"], ["Protéines", "Fromage blanc 0%", "500 g"], ["Protéines", "Jambon cru / jambon de pays", "150 g"], ["Féculents", "Riz", "500 g"], ["Féculents", "Pâtes", "300 g"], ["Féculents", "Patate douce", "500 g"], ["Féculents", "Pommes de terre", "500 g"], ["Féculents", "Flocons d'avoine", "500 g"], ["Féculents", "Pain complet", "1 paquet"], ["Féculents", "Wrap", "1 paquet (6-8)"], ["Légumes & fruits", "Bananes", "7"], ["Légumes & fruits", "Pommes", "4"], ["Légumes & fruits", "Fruits rouges (frais/congelés)", "300 g"], ["Légumes & fruits", "Myrtilles congelées", "200 g"], ["Légumes & fruits", "Pastèque", "1"], ["Légumes & fruits", "Melon", "2"], ["Légumes & fruits", "Pêches", "4"], ["Légumes & fruits", "Concombre", "2"], ["Légumes & fruits", "Courgette / poivron / haricots verts / tomate", "~500 g chacun"], ["Légumes & fruits", "Avocat", "2"], ["Légumes & fruits", "Mangue", "1"], ["Autres", "Beurre de cacahuète", "1 pot"], ["Autres", "Huile d'olive", "1 bouteille"], ["Autres", "Lait", "2 L"], ["Autres", "Lait d'amande / lait de coco", "1 L"], ["Autres", "Miel", "1 pot"], ["Autres", "Graines de chia", "100 g"], ["Autres", "Granola", "250 g"], ["Autres", "Cream cheese", "1 petit pot"], ["Autres", "Féta", "1 brique"], ["Autres", "Burrata / stracciatella", "3"], ["Autres", "Gingembre frais + citron + orange", "pour le shot de la semaine"]], "ecarts": "Cheat meal : 1x/semaine, jamais le dimanche (pas de carte resto/fast-food type McDo active ce jour-là) — choisis le jour selon ton programme. Sortie verre avec Eva : 1x/semaine si besoin, à caser dans un créneau \"Libre\" (vendredi ou samedi soir sont les plus naturels). Coucher vendredi/samedi : tu te couches souvent plus tard ces deux soirs — les horaires ci-dessus restent la base, mais ce n'est pas grave si ça glisse, on ajustera avec le temps si besoin.", "regles": "Un créneau formation qui saute ne disparaît pas : il se rattrape dans le week-end. L'anglais profite aussi des trajets (podcast/app = ~2h30 gratuites par semaine en plus de l'heure fixe). Le Sylob s'apprend au boulot, sur les cas réels — pas besoin de créneau dédié (plan 4 semaines dans Programme Sylob). Si tu ne devais garder que 3 choses : les séances de sport, l'heure d'anglais, la revue du dimanche.", "oats": [["Strawberry Cheesecake", "50g flocons d'avoine + 1 dose (30g) whey vanille + 100g yaourt + 100ml lait d'amande + 1 c.à.s graines de chia + 80g fraises congelées + 20g cream cheese + 1 c.à.c miel"], ["Chocolate Peanut Butter", "50g flocons d'avoine + 1 dose (30g) whey chocolat + 100g yaourt + 100ml lait d'amande + 1 c.à.s cacao en poudre + 1 c.à.s graines de chia + 1/2 banane + 1 c.à.s beurre de cacahuète + 1 c.à.c miel"], ["Mango Coconut", "50g flocons d'avoine + 1 dose (30g) whey vanille + 100g yaourt + 100ml lait de coco + 1 c.à.s graines de chia + 80g mangue congelée + 1 c.à.s noix de coco râpée + 1 c.à.c miel"], ["Blueberry Lemon", "50g flocons d'avoine + 1 dose (30g) whey vanille + 100g yaourt + 100ml lait d'amande + zeste d'1/2 citron + 1 c.à.s graines de chia + 80g myrtilles congelées + 1 c.à.c miel"], ["Apple Pie", "50g flocons d'avoine + 1 dose (30g) whey vanille + 100g yaourt + 100ml lait d'amande + 1 c.à.c cannelle + 1 c.à.s graines de chia + 60g compote de pomme + 15g granola + 1 c.à.c miel"]], "bowls": [["Vanilla Strawberry", "250g yaourt protéiné vanille + 20g granola + banane + fraises + 5g éclats d'amande + 10g beurre de cacahuète"], ["Chocolate", "250g yaourt protéiné chocolat + 15g poudre de coco + 15g granola + 1/2 banane + 5g graines de chia + éclats d'amande + 10g pépites de chocolat"], ["Berry Blast", "250g açaï protéiné + 10g poudre de coco + 10g fruits à coque mélangés + 50g myrtilles + 10g éclats d'amande"], ["Green Power", "250g yaourt protéiné kiwi + kiwi + banane + 10g fruits à coque mélangés + 10g poudre de coco + (5g pépites de chocolat)"], ["Pineapple Sensation", "250g yaourt protéiné ananas + 50g ananas + 15g granola + 10g graines de chia + 50g framboises"], ["Apple Cinnamon", "250g smoothie protéiné + 50g pomme + framboises + 15g granola + 10g graines de chia + 10g beurre de cacahuète + cannelle"]], "recettes_ete": [["Salade pastèque, melon, pêche, féta & jambon cru", "Pastèque + melon (billes) + 1 pêche jaune en dés + 1/2 brique de féta en cubes + 4 tranches de jambon cru + basilic et menthe hachés + huile d'olive + vinaigre balsamique + fleur de sel"], ["Tartines pêche, burrata & jambon de pays", "Pain de campagne grillé + burrata ou stracciatella + pêches en tranches + jambon de pays + crème balsamique + miel + piment d'Espelette + origan + huile d'olive"], ["Salade d'été burrata, pastèque, melon, concombre", "Burrata + pastèque + melon + concombre en dés + huile d'olive + menthe (quantités libres)"], ["Melon, burrata & jambon cru", "1/2 melon en fines lamelles + 1 burrata + 4-5 tranches de jambon cru + basilic + filet de crème balsamique + 1 c.à.c d'huile d'olive + poivre"], ["Protein smoothie bowl (5 min)", "1 banane + 1 dose de whey + un peu de lait écrémé + 1 c.à.c graines de chia + glaçons + fruits secs — mixer, garnir avec des fruits"], ["Pancakes banane protéinés", "2 œufs + 100g farine + 1 c.à.c levure + 120ml lait + 1 dose whey (optionnel) — tremper une banane entière dans la pâte, cuire à la poêle jusqu'à dorure"], ["Brie au four & bresaola (recevoir/apéro)", "Brie à température ambiante + bresaola + miel + noix concassées + 1 gousse d'ail râpée + thym frais + piment en flocons — four 200°C ~10 min ; crostinis à l'huile d'olive"]], "mes_recettes": [["Salade fraîche", "150g mélange de salades + 1/2 concombre + 10 tomates cerises + 1/4 oignon rouge + 30g feta + 1 c.à.s huile d'olive + 1 c.à.c vinaigre balsamique + sel/poivre"], ["Galette de pomme de terre maison", "300g pommes de terre râpées (essorées) + 1 œuf + 1 c.à.s farine + sel/poivre — façonner en galettes, cuire 4-5 min par face à la poêle avec un peu d'huile"], ["Barre de céréales maison", "100g flocons d'avoine + 50g miel + 30g beurre de cacahuète + 30g fruits secs/noix — mélanger à chaud, tasser dans un moule, frigo 1h, découper en 6-8 barres"], ["Wrap poulet mariné", "1 tortilla + 150g poulet mariné (voir Poulet mariné mexicaine ou marinade libre) + salade + 1/2 tomate + 20g fromage râpé + 1 c.à.s sauce yaourt — poêler le poulet, garnir, rouler"], ["Pain fourré", "1 pain individuel + 100g garniture (jambon/poulet + fromage + crudités selon envie) — quantités libres selon la garniture choisie"], ["\"Frukito\"", "Pâte à pizza (200g) + 150g poulet en dés + 1 c.à.s curry + 50g oignon + 50g fromage râpé — garnir la pâte, cuire au four 200°C ~12-15 min"], ["Riz cantonnais", "150g riz cuit (la veille de préférence) + 1 œuf + 80g jambon ou poulet en dés + 50g petits pois + 30g maïs + 1 c.à.s sauce soja + 1 c.à.s huile — faire revenir à la poêle/wok, ajouter l'œuf battu en dernier"], ["Poulet sachet du jour", "150-200g poulet mariné la veille (marinade libre : soja/citron/épices) + 100g riz — à préparer en portions et congeler ; décongeler la veille, poêler 8-10 min"], ["Pâtes bolognaise", "100g pâtes (poids sec) + 150g viande hachée + 200g sauce tomate + 1/2 oignon + 1 gousse d'ail + herbes de Provence — faire revenir viande + oignon/ail, ajouter la sauce, mijoter 15 min"], ["Poulet mariné mexicaine", "150g poulet + marinade (jus de citron vert + 1 c.à.c paprika + 1 c.à.c cumin + 1 gousse d'ail + huile d'olive), mariner 30 min min + 100g riz — poêler le poulet 8-10 min"], ["Pâte fraîche maison", "200g farine + 2 œufs + 1 pincée de sel — pétrir 10 min, repos 30 min, étaler et découper selon la forme voulue, cuisson 2-3 min à l'eau bouillante"], ["Haricots préparés", "200g haricots verts frais ou surgelés + 1 échalote + 1 c.à.s huile d'olive + ail/persil — cuire à la vapeur 8-10 min puis sauter 2 min à la poêle avec l'échalote"], ["Tartare", "150-200g tartare de bœuf (préparé par le boucher ou haché frais) + 1 c.à.c moutarde + 1 c.à.c câpres + 1/2 échalote + quelques gouttes de tabasco + 1 jaune d'œuf — servir avec frites ou salade"]], "rituel_sante": [["Ginger Wellness Shot", "Pour ~6-8 shots (garde 3-4 jours au frigo) : 2 gros morceaux de gingembre frais + 1 citron + 1 orange + 1/2 c.à.c poivre de cayenne + 10g miel + 1/4 tasse (60ml) vinaigre de cidre + ~1,5 tasse (350ml) eau — mixer et filtrer, à jeun le matin"], ["Café glacé maison", "Café fort (espresso ou cold brew) refroidi + glaçons + un peu de lait ou lait d'amande, sucré selon envie"]], "mantras": ["Discipline", "Régularité", "Focus", "Prouver à soi-même", "Juste une période d'habitude", "Routine", "Action", "Mentalité active concentrée", "Je suis le meilleur", "Je peux le faire", "Je suis un gagnant", "Pas le choix", "Go go go", "Évolution efforts"], "interdits": ["Pas fumer", "Pas de porno", "Pas de fête", "Pas de téléphone (soir)", "Éviter le sucré", "Full sobriété", "Éviter les drames"], "identite": ["Devenir riche", "Être un homme", "Prouver à tous", "Train de vie sain, optimisé"], "todo_urgent": [["Véhicule", "Moteur Gaspard — entretien", "À préciser"], ["Véhicule", "Check huile 208", "À préciser"], ["Administratif", "Check compte CPF", "À préciser"], ["Finance", "Ouvrir LEP", "À préciser"], ["Carrière", "Postuler pour Mars", "À préciser"], ["Projet de vie", "Acheter la bague de fiançailles", "À préciser"], ["Projet de vie", "Faire la demande en mariage", "À préciser"], ["Véhicule", "RDV 208 — contrôle technique", "Dès que possible"], ["Perso", "An const DAY_ORDER = ["LUNDI","MARDI","MERCREDI","JEUDI","VENDREDI","SAMEDI","DIMANCHE"];
const DAY_KEY = {LUNDI:"lundi",MARDI:"mardi",MERCREDI:"mercredi",JEUDI:"jeudi",VENDREDI:"vendredi",SAMEDI:"samedi",DIMANCHE:"dimanche"};
const DAY_LABEL = {LUNDI:"Lundi",MARDI:"Mardi",MERCREDI:"Mercredi",JEUDI:"Jeudi",VENDREDI:"Vendredi",SAMEDI:"Samedi",DIMANCHE:"Dimanche"};

// JS getDay(): 0=dimanche..6=samedi -> notre index lundi=0..dimanche=6
function todayLabel(){
  const jsDay = new Date().getDay();
  const idx = (jsDay + 6) % 7; // lundi=0
  return DAY_ORDER[idx];
}
function dateForLabel(label){
  const today = new Date();
  const jsDay = today.getDay();
  const curIdx = (jsDay + 6) % 7;
  const monday = new Date(today); monday.setDate(today.getDate() - curIdx);
  const idx = DAY_ORDER.indexOf(label);
  const d = new Date(monday); d.setDate(monday.getDate() + idx);
  return d;
}
function fmtDate(d){
  return d.toLocaleDateString("fr-FR", {weekday:undefined, day:"2-digit", month:"2-digit", year:"numeric"});
}

// --- résolution des recettes (même logique que make_pdfs.py resolve_meal) ---
const RECIPE_LOOKUP = {};
(D.oats||[]).forEach(([name,ing]) => RECIPE_LOOKUP["Overnight oats " + name] = ing);
(D.bowls||[]).forEach(([name,ing]) => RECIPE_LOOKUP["Bowl protéiné " + name] = ing);
(D.recettes_ete||[]).forEach(([name,ing]) => RECIPE_LOOKUP[name] = ing);
(D.mes_recettes||[]).forEach(([name,ing]) => RECIPE_LOOKUP[name.split(" (")[0]] = ing);
(D.rituel_sante||[]).forEach(([name,ing]) => RECIPE_LOOKUP[name] = ing);
function resolveMeal(text){
  if(!text) return {name:"", detail:""};
  const m = text.match(/\s*\(voir Recettes\)\s*$/);
  if(m){
    const name = text.replace(/\s*\(voir Recettes\)\s*$/,"").trim();
    const ing = RECIPE_LOOKUP[name];
    if(ing) return {name, detail:ing};
    return {name, detail:""};
  }
  return {name:"", detail:text};
}

// --- stockage persistant : localStorage si dispo (Safari / écran d'accueil),
// repli mémoire sinon (ex. aperçu intégré). Tout ce que tu coches ou écris
// est conservé d'une ouverture à l'autre sur le même appareil/navigateur. ---
const store = (() => {
  try {
    localStorage.setItem("__svt", "1"); localStorage.removeItem("__svt");
    return localStorage;
  } catch(e) {
    const m = {};
    return {getItem:k => (k in m ? m[k] : null), setItem:(k,v) => {m[k]=String(v);}, removeItem:k => {delete m[k];}};
  }
})();
function bindCheck(cb, rowEl, key){
  const k = "SV:" + key;
  if(store.getItem(k) === "1"){ cb.checked = true; rowEl.classList.add("done"); }
  cb.addEventListener("change", () => {
    rowEl.classList.toggle("done", cb.checked);
    store.setItem(k, cb.checked ? "1" : "0");
  });
}
function bindText(inputEl, key){
  const k = "SV:" + key;
  const saved = store.getItem(k);
  if(saved !== null) inputEl.value = saved;
  inputEl.addEventListener("input", () => store.setItem(k, inputEl.value));
}
// comme bindText, mais avec une valeur de départ (ex: la note déjà écrite dans l'Excel)
// utilisée seulement si rien n'a encore été modifié sur cet appareil.
function bindTextSeeded(inputEl, key, seed){
  const k = "SV:" + key;
  const saved = store.getItem(k);
  inputEl.value = (saved !== null) ? saved : (seed || "");
  inputEl.addEventListener("input", () => store.setItem(k, inputEl.value));
}
function bindSelect(selectEl, key, seed){
  const k = "SV:" + key;
  const saved = store.getItem(k);
  selectEl.value = (saved !== null) ? saved : (seed || selectEl.value);
  selectEl.addEventListener("change", () => store.setItem(k, selectEl.value));
}
function noteArea(key, placeholder){
  const ta = el("textarea");
  ta.placeholder = placeholder || "Mes notes…";
  ta.style.minHeight = "44px";
  ta.style.marginTop = "8px";
  bindText(ta, key);
  return ta;
}

function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}
function esc(s){
  return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function mantraBlock(label){
  const idx = DAY_ORDER.indexOf(label) % D.mantras.length;
  const mantra = D.mantras[idx];
  const wrap = el("div","mantra");
  wrap.innerHTML = `
    <div class="icon">☀</div>
    <div class="label">Mantra du jour</div>
    <div class="quote">« ${esc(mantra)} »</div>
    <div class="meta"><b>Interdits :</b> ${esc(D.interdits.join(" · "))}<br><b>Identité visée :</b> ${esc(D.identite.join(" · "))}</div>`;
  return wrap;
}

function sectionEl(title, accentClass){
  const box = el("div","section");
  box.appendChild(el("div","section-head" + (accentClass?(" "+accentClass):""), esc(title)));
  const body = el("div","section-body");
  box.appendChild(body);
  return {box, body};
}

    cards.forEach(([slot,name,detail]) => {

      grid.appendChild(c);
    });
    s.body.appendChild(grid);
    view.appendChild(s.box);
  }
}

// ================= TODO =================
const TODO_STATUSES = ["À faire","En cours","Planifié","En continu","Projet de vie","Fait"];
const TODO_PRIORITIES = ["Haute","Moyenne","Basse"];
const TODO_URGENT_MARKERS = ["aujourd'hui","aujourdhui","en retard"];

function todoExtraKey(){ return "SV:todo:extra"; }
function getExtraTasks(){
  try { return JSON.parse(store.getItem(todoExtraKey()) || "[]"); } catch(e){ return []; }
}
function saveExtraTasks(arr){ store.setItem(todoExtraKey(), JSON.stringify(arr)); }

function todoLocalState(item){
  const sK = "SV:todoitem:" + item.task + ":status";
  const pK = "SV:todoitem:" + item.task + ":priority";
  const s = store.getItem(sK);
  const p = store.getItem(pK);
  return { status: s !== null ? s : item.status, priority: p !== null ? p : item.priority };
}
function todoIsUrgent(item){
  const e = (item.echeance||"").toLowerCase();
  return TODO_URGENT_MARKERS.some(m => e.includes(m));
}

let todoFilter = "haute"; // haute | moyenne | basse | suivi | planifie | fait | tout
const PRIO_ORDER = {Haute:0, Moyenne:1, Basse:2};
const STATUS_ORDER = {"À faire":0,"En cours":1,"En continu":2,"Planifié":3,"Projet de vie":4,"Fait":5};

function renderTodo(){
  const view = document.getElementById("viewTodo");
  view.innerHTML = "";

  // --- barre d'ajout (une ligne) ---
  const addBar = el("div","addbar");
  const nameInp = el("input"); nameInp.type="text"; nameInp.placeholder="+ Nouvelle tâche…";
  const addBtn = el("button", null, "Ajouter");
  addBar.appendChild(nameInp); addBar.appendChild(addBtn);
  function addTask(){
    const name = nameInp.value.trim();
    if(!name) return;
    const extra = getExtraTasks();
    extra.push({task:name, cat:"Nouvelles", priority:"Moyenne", status:"À faire",
                note:"", echeance:"", advice:"", extra:true});
    saveExtraTasks(extra);
    nameInp.value = "";
    todoFilter = "nouvelles"; // bascule sur l'onglet Nouvelles pour la voir tout de suite
    renderTodo();
  }
  addBtn.addEventListener("click", addTask);
  nameInp.addEventListener("keydown", e => { if(e.key==="Enter") addTask(); });
  view.appendChild(addBar);

  const all = (PAYLOAD.todo||[]).concat(getExtraTasks());
  const withState = all.map(item => Object.assign({}, item, todoLocalState(item)));

  const actif = x => (x.status==="À faire" || x.status==="En cours");
  const buckets = {
    nouvelles: withState.filter(x => x.extra && x.status!=="Fait"),
    haute: withState.filter(x => actif(x) && x.priority==="Haute"),
    moyenne: withState.filter(x => actif(x) && x.priority==="Moyenne"),
    basse: withState.filter(x => actif(x) && x.priority==="Basse"),
    suivi: withState.filter(x => ["En continu","Projet de vie"].includes(x.status)),
    planifie: withState.filter(x => x.status==="Planifié"),
    fait: withState.filter(x => x.status==="Fait"),
  };
  if(todoFilter==="nouvelles" && !buckets.nouvelles.length) todoFilter = "haute";

  // --- filtres ---
  const filters = [];
  if(buckets.nouvelles.length) filters.push(["nouvelles", `✦ Nouvelles (${buckets.nouvelles.length})`]);
  filters.push(
    ["haute", `Haute (${buckets.haute.length})`],
    ["moyenne", `Moyenne (${buckets.moyenne.length})`],
    ["basse", `Basse (${buckets.basse.length})`],
    ["suivi", `Suivi (${buckets.suivi.length})`],
    ["planifie", `Planifié (${buckets.planifie.length})`],
    ["fait", `Fait (${buckets.fait.length})`],
    ["tout", "Tout"],
  );
  const fbar = el("div","tfilters");
  filters.forEach(([key, lab]) => {
    const b = el("button", key===todoFilter ? "active" : null, lab);
    b.addEventListener("click", () => { todoFilter = key; renderTodo(); });
    fbar.appendChild(b);
  });
  view.appendChild(fbar);

  let items = (todoFilter==="tout") ? withState : (buckets[todoFilter] || withState);

  items = items.slice().sort((a,b) => {
    const u = (todoIsUrgent(b)&&b.status!=="Fait"?1:0) - (todoIsUrgent(a)&&a.status!=="Fait"?1:0);
    if(u) return u;
    const s = (STATUS_ORDER[a.status]??9) - (STATUS_ORDER[b.status]??9);
    if(s) return s;
    return (PRIO_ORDER[a.priority]??9) - (PRIO_ORDER[b.priority]??9);
  });

  // --- tableau ---
  const wrap = el("div","ttable-wrap");
  const table = el("table","ttable");
  table.innerHTML = `<tr><th class="h-done"></th><th>Tâche</th><th class="h-pr">Prio</th><th class="h-st">Statut</th><th class="h-com">Commentaire</th></tr>`;
  items.forEach(item => {
    const st = todoLocalState(item);
    const tr = document.createElement("tr");
    if(st.status==="Fait") tr.className = "done";
    const urgent = todoIsUrgent(item) && st.status!=="Fait";

    // done checkbox
    const tdDone = document.createElement("td"); tdDone.className="c-done";
    const cb = el("input"); cb.type="checkbox"; cb.checked = st.status==="Fait";
    cb.addEventListener("change", () => {
      store.setItem("SV:todoitem:" + item.task + ":status", cb.checked ? "Fait" : "À faire");
      renderTodo();
    });
    tdDone.appendChild(cb);

    // task cell (tap = détail)
    const tdTask = document.createElement("td");
    tdTask.innerHTML = `<div class="t-task">${esc(item.task)}</div>` +
      `<div class="t-sub">${esc(item.cat)}${item.echeance?` · <span class="t-ech${urgent?" urgent":""}">${urgent?"🔴 ":""}${esc(item.echeance)}</span>`:""}</div>`;

    // priority select
    const tdPr = document.createElement("td");
    const prSel = el("select","sel-" + st.priority);
    TODO_PRIORITIES.forEach(p => { const o=document.createElement("option"); o.value=p; o.textContent=p; prSel.appendChild(o); });
    prSel.value = st.priority;
    prSel.addEventListener("change", () => { store.setItem("SV:todoitem:" + item.task + ":priority", prSel.value); renderTodo(); });
    tdPr.appendChild(prSel);

    // status select
    const tdSt = document.createElement("td");
    const stSel = el("select");
    TODO_STATUSES.forEach(s => { const o=document.createElement("option"); o.value=s; o.textContent=s; stSel.appendChild(o); });
    stSel.value = st.status;
    stSel.addEventListener("change", () => { store.setItem("SV:todoitem:" + item.task + ":status", stSel.value); renderTodo(); });
    tdSt.appendChild(stSel);

    // commentaire perso (inline, persistant)
    const tdCom = document.createElement("td");
    const comInp = el("input","t-com"); comInp.type="text"; comInp.placeholder="…";
    bindText(comInp, "todoitem:" + item.task + ":comment");
    tdCom.appendChild(comInp);

    tr.appendChild(tdDone); tr.appendChild(tdTask); tr.appendChild(tdPr); tr.appendChild(tdSt); tr.appendChild(tdCom);
    table.appendChild(tr);

    // ligne détail (repliée par défaut) : note + conseil
    const trD = document.createElement("tr");
    trD.className = "trow-detail";
    trD.style.display = "none";
    const tdD = document.createElement("td");
    tdD.colSpan = 5;
    const ta = el("textarea");
    ta.placeholder = "Ta note…";
    bindTextSeeded(ta, "todoitem:" + item.task + ":note", item.note);
    tdD.appendChild(ta);
    if(item.advice) tdD.appendChild(el("div","advice", "<b>Conseil :</b> " + esc(item.advice)));
    trD.appendChild(tdD);
    table.appendChild(trD);
    tdTask.addEventListener("click", () => {
      trD.style.display = (trD.style.display==="none") ? "" : "none";
    });
  });
  wrap.appendChild(table);
  view.appendChild(wrap);

  view.appendChild(el("div","tcount", "Touche une tâche pour voir/écrire la note et le conseil. Liste basée sur le dernier export Excel + tes ajouts ici."));
}

};

  });
}

renderJour(today);
