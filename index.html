<style>
:root{
  --navy:#1F2D50; --blue:#2E5AAC; --gold:#C9A24D; --gold-light:#F4E9D3;
  --cream:#FBF8F2; --sand:#F2EEE3; --hairline:#DAD6CC; --sage:#7C9473;
  --sage-light:#EAF0E7; --coral:#B85C3E; --coral-light:#F7EAE3; --gray:#5C5A54;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--sand); color:var(--navy);
  padding-bottom:56px; -webkit-tap-highlight-color:transparent;
}
h1,h2,h3{margin:0; font-weight:700;}
.header{
  background:var(--navy); color:#fff; padding:14px 16px 10px;
  position:sticky; top:0; z-index:20;
  padding-top:calc(14px + env(safe-area-inset-top));
}
.header .kicker{font-size:11px; letter-spacing:.08em; color:var(--gold); font-weight:600; text-transform:uppercase;}
.header h1{font-size:20px; margin-top:2px;}
.header .sub{font-size:12px; color:#c9d0e0; margin-top:2px;}
.daypicker{margin-top:8px;}
.daypicker select{
  width:100%; padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08); color:#fff; font-size:14px; font-weight:600;
}
.daypicker select option{color:#000;}
.tabs{
  display:flex; position:sticky; top:0; z-index:19; background:var(--navy);
  border-bottom:2px solid var(--gold);
}
.tabs button{
  flex:1; padding:10px 6px; background:none; border:none; color:#c9d0e0;
  font-size:14px; font-weight:600; font-family:inherit;
}
.tabs button.active{color:#fff; box-shadow:inset 0 -3px 0 var(--gold);}
main{padding:12px;}
.section{
  background:#fff; border-radius:14px; margin-bottom:12px; overflow:hidden;
  border:1px solid var(--hairline);
}
.section-head{
  padding:10px 14px; font-size:13px; font-weight:700; letter-spacing:.02em;
  border-left:4px solid var(--gold); background:var(--cream); color:var(--navy);
}
.section-head.blue{border-left-color:var(--blue); background:#EEF2FA;}
.section-head.sage{border-left-color:var(--sage); background:var(--sage-light);}
.section-head.coral{border-left-color:var(--coral); background:var(--coral-light);}
.section-body{padding:10px 14px 14px;}
.mantra{
  background:var(--gold-light); border:1.4px solid var(--gold); border-radius:16px;
  padding:16px; text-align:center; margin-bottom:12px;
}
.mantra .icon{
  width:40px; height:40px; margin:0 auto 6px; border-radius:50%; background:var(--gold);
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px;
}
.mantra .label{font-size:10px; letter-spacing:.1em; color:var(--gold); font-weight:700; text-transform:uppercase;}
.mantra .quote{font-size:19px; font-weight:700; font-style:italic; color:var(--navy); margin:4px 0 8px;}
.mantra .meta{font-size:11px; color:var(--gray); line-height:1.5;}
.row{display:flex; align-items:flex-start; gap:10px; padding:8px 0; border-bottom:1px solid var(--hairline);}
.row:last-child{border-bottom:none;}
.row .time{flex:0 0 78px; font-weight:700; font-size:12px; color:var(--blue);}
.row .content{flex:1;}
.row .activity{font-weight:600; font-size:14px;}
.row .note{font-size:12px; color:var(--gray); margin-top:2px; line-height:1.4;}
.check{display:flex; align-items:center; gap:10px; padding:7px 0;}
.check input{width:19px; height:19px; accent-color:var(--sage); flex:0 0 auto;}
.check label{font-size:13.5px; flex:1;}
.check.done label{color:var(--gray); text-decoration:line-through;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:0 14px;}
@media (max-width:420px){.grid2{grid-template-columns:1fr;}}
.pill{display:inline-block; font-size:10px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  color:var(--sage); background:var(--sage-light); border-radius:6px; padding:2px 7px; margin-bottom:4px;}
.card{border:1px solid var(--hairline); border-radius:10px; padding:10px 12px; margin-bottom:10px; background:var(--cream);}
.card h4{font-size:13.5px; margin-bottom:4px;}
.card p{font-size:12px; color:var(--gray); margin:0; line-height:1.5;}
textarea{
  width:100%; min-height:80px; border:1px solid var(--hairline); border-radius:10px;
  padding:10px; font-family:inherit; font-size:13px; resize:vertical; background:#fff;
}
input[type=text].prio{
  width:100%; border:none; border-bottom:1.5px solid var(--hairline); padding:8px 2px;
  font-size:14px; font-family:inherit; background:transparent;
}
input[type=text].prio:focus{outline:none; border-color:var(--gold);}
.prio-row{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
.prio-row .num{flex:0 0 18px; font-weight:700; color:var(--gold); font-size:14px;}
table{width:100%; border-collapse:collapse; font-size:12.5px;}
table th{background:var(--navy); color:#fff; text-align:left; padding:6px 8px; font-size:11px;}
table td{padding:6px 8px; border-bottom:1px solid var(--hairline); vertical-align:top;}
table tr:nth-child(even) td{background:var(--cream);}
.small{font-size:11.5px; color:var(--gray);}
.badge{display:inline-block; background:var(--navy); color:#fff; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700;}
.empty{color:var(--gray); font-size:13px; font-style:italic; padding:6px 0;}
footer.app-footer{text-align:center; font-size:10.5px; color:var(--gray); padding:18px 12px 8px;}
</style>
</head>

const D = PAYLOAD.D;
const DAY_ORDER = ["LUNDI","MARDI","MERCREDI","JEUDI","VENDREDI","SAMEDI","DIMANCHE"];
const DAY_KEY = {LUNDI:"lundi",MARDI:"mardi",MERCREDI:"mercredi",JEUDI:"jeudi",VENDREDI:"vendredi",SAMEDI:"samedi",DIMANCHE:"dimanche"};
const DAY_LABEL = {LUNDI:"Lundi",MARDI:"Mardi",MERCREDI:"Mercredi",JEUDI:"Jeudi",VENDREDI:"Vendredi",SAMEDI:"Samedi",DIMANCHE:"Dimanche"};

// JS getDay(): 0=dimanche..6=samedi -> notre index lundi=0..dimanche=6
function todayLabel(){
  const jsDay = new Date().getDay();
  const idx = (jsDay + 6) % 7; // lundi=0
  return DAY_ORDER[idx];
}
function dateForLabel(label){
  const today = new Date();
  const jsDay = today.getDay();
  const curIdx = (jsDay + 6) % 7;
  const monday = new Date(today); monday.setDate(today.getDate() - curIdx);
  const idx = DAY_ORDER.indexOf(label);
  const d = new Date(monday); d.setDate(monday.getDate() + idx);
  return d;
}
function fmtDate(d){
  return d.toLocaleDateString("fr-FR", {weekday:undefined, day:"2-digit", month:"2-digit", year:"numeric"});
}

// --- résolution des recettes (même logique que make_pdfs.py resolve_meal) ---
const RECIPE_LOOKUP = {};
(D.oats||[]).forEach(([name,ing]) => RECIPE_LOOKUP["Overnight oats " + name] = ing);
(D.bowls||[]).forEach(([name,ing]) => RECIPE_LOOKUP["Bowl protéiné " + name] = ing);
(D.recettes_ete||[]).forEach(([name,ing]) => RECIPE_LOOKUP[name] = ing);
(D.mes_recettes||[]).forEach(([name,ing]) => RECIPE_LOOKUP[name.split(" (")[0]] = ing);
(D.rituel_sante||[]).forEach(([name,ing]) => RECIPE_LOOKUP[name] = ing);
function resolveMeal(text){
  if(!text) return {name:"", detail:""};
  const m = text.match(/\s*\(voir Recettes\)\s*$/);
  if(m){
    const name = text.replace(/\s*\(voir Recettes\)\s*$/,"").trim();
    const ing = RECIPE_LOOKUP[name];
    if(ing) return {name, detail:ing};
    return {name, detail:""};
  }
  return {name:"", detail:text};
}

// --- stockage persistant : localStorage si dispo (Safari / écran d'accueil),
// repli mémoire sinon (ex. aperçu intégré). Tout ce que tu coches ou écris
// est conservé d'une ouverture à l'autre sur le même appareil/navigateur. ---
const store = (() => {
  try {
    localStorage.setItem("__svt", "1"); localStorage.removeItem("__svt");
    return localStorage;
  } catch(e) {
    const m = {};
    return {getItem:k => (k in m ? m[k] : null), setItem:(k,v) => {m[k]=String(v);}, removeItem:k => {delete m[k];}};
  }
})();
function bindCheck(cb, rowEl, key){
  const k = "SV:" + key;
  if(store.getItem(k) === "1"){ cb.checked = true; rowEl.classList.add("done"); }
  cb.addEventListener("change", () => {
    rowEl.classList.toggle("done", cb.checked);
    store.setItem(k, cb.checked ? "1" : "0");
  });
}
function bindText(inputEl, key){
  const k = "SV:" + key;
  const saved = store.getItem(k);
  if(saved !== null) inputEl.value = saved;
  inputEl.addEventListener("input", () => store.setItem(k, inputEl.value));
}
function noteArea(key, placeholder){
  const ta = el("textarea");
  ta.placeholder = placeholder || "Mes notes…";
  ta.style.minHeight = "44px";
  ta.style.marginTop = "8px";
  bindText(ta, key);
  return ta;
}

function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}
function esc(s){
  return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function mantraBlock(label){
  const idx = DAY_ORDER.indexOf(label) % D.mantras.length;
  const mantra = D.mantras[idx];
  const wrap = el("div","mantra");
  wrap.innerHTML = `
    <div class="icon">☀</div>
    <div class="label">Mantra du jour</div>
    <div class="quote">« ${esc(mantra)} »</div>
    <div class="meta"><b>Interdits :</b> ${esc(D.interdits.join(" · "))}<br><b>Identité visée :</b> ${esc(D.identite.join(" · "))}</div>`;
  return wrap;
}

function sectionEl(title, accentClass){
  const box = el("div","section");
  box.appendChild(el("div","section-head" + (accentClass?(" "+accentClass):""), esc(title)));
  const body = el("div","section-body");
  box.appendChild(body);
  return {box, body};
}

function renderJour(label){
  const view = document.getElementById("viewJour");
  view.innerHTML = "";
  const d = dateForLabel(label);
  document.getElementById("headerTitle").textContent = DAY_LABEL[label] + " " + fmtDate(d);
  const key = DAY_KEY[label];
  const rows = D[key] || [];

  view.appendChild(mantraBlock(label));

  // 3 priorités — persistantes (par jour de semaine)
  let s = sectionEl("LES 3 PRIORITÉS DU JOUR");
  for(let i=1;i<=3;i++){
    const pr = el("div","prio-row");
    pr.innerHTML = `<span class="num">${i}.</span>`;
    const inp = el("input","prio"); inp.type="text"; inp.placeholder="…";
    bindText(inp, label + ":prio" + i);
    pr.appendChild(inp);
    s.body.appendChild(pr);
  }
  view.appendChild(s.box);

  // Tâches prioritaires — cochage persistant (partagé entre les jours : c'est la même liste)
  if(D.todo_urgent && D.todo_urgent.length){
    s = sectionEl("TÂCHES PRIORITAIRES (To-Do)", "coral");
    D.todo_urgent.forEach(([cat, task, ech], i) => {
      const c = el("div","check");
      const cb = el("input"); cb.type="checkbox"; cb.id="todo"+i;
      const lb = el("label", null, `<b>${esc(task)}</b><br><span class="small">${esc(cat)}${ech?(" · "+esc(String(ech))):""}</span>`);
      lb.htmlFor = cb.id;
      c.appendChild(cb); c.appendChild(lb);
      bindCheck(cb, c, "todo:" + task);
      s.body.appendChild(c);
    });
    s.body.appendChild(noteArea("todo:notes", "Notes To-Do…"));
    view.appendChild(s.box);
  }

  // Horaires
  s = sectionEl("HORAIRES DE LA JOURNÉE", "blue");
  rows.forEach(([time, act, note]) => {
    const r = el("div","row");
    r.innerHTML = `<div class="time">${esc(time)}</div><div class="content"><div class="activity">${esc(act)}</div>${note?`<div class="note">${esc(note)}</div>`:""}</div>`;
    s.body.appendChild(r);
  });
  s.body.appendChild(noteArea(label + ":horaires:notes", "Notes sur la journée (imprévus, ajustements)…"));
  view.appendChild(s.box);

  // Repas
  const jourMenu = (D.menu||[]).find(m => m[0] === DAY_LABEL[label]);
  s = sectionEl("REPAS DU JOUR", "sage");
  if(jourMenu){
    const [, pd, dej, din, shk] = jourMenu;
    [["Petit-déj",pd],["Déjeuner",dej],["Dîner",din],["Shaker",shk]].forEach(([slot,text]) => {
      const {name, detail} = resolveMeal(text);
      const row = el("div","row");
      row.innerHTML = `<div class="time">${slot}</div><div class="content"><div class="activity">${esc(name||"")}</div><div class="note">${esc(name?detail:detail)}</div></div>`;
      s.body.appendChild(row);
    });
  }
  const gingerDetail = (D.rituel_sante||[]).find(x=>x[0]==="Ginger Wellness Shot");
  if(gingerDetail){
    s.body.appendChild(el("div","small", "<b>Rituel santé :</b> Ginger Wellness Shot — " + esc(gingerDetail[1])));
  }
  s.body.appendChild(noteArea(label + ":repas:notes", "Notes repas (ce que tu as vraiment mangé, écarts)…"));
  view.appendChild(s.box);

  // Sport / formation
  if(PAYLOAD.sportDayMap[label]){
    const splitTitle = PAYLOAD.sportDayMap[label];
    const exs = (D.split||[]).find(x => x[0] === splitTitle);
    s = sectionEl("ÉCHAUFFEMENT (~5-6 min)", "blue");
    const mat = el("div","small", "<b>Matériel à préparer avant :</b> " + esc(D.materiel_sport||""));
    mat.style.marginBottom = "8px";
    s.body.appendChild(mat);
    const wlist = el("div");
    wlist.innerHTML = PAYLOAD.warmupShort.map(w=>`<div class="small">• ${esc(w)}</div>`).join("");
    s.body.appendChild(wlist);
    view.appendChild(s.box);

    s = sectionEl("SPORT DU JOUR — " + splitTitle, "blue");
    if(exs){
      const t = el("table");
      t.innerHTML = "<tr><th>Exercice</th><th>Volume</th></tr>" +
        exs[1].map(([ex,vol,note]) => `<tr><td><b>${esc(ex)}</b>${note?`<br><span class="small">${esc(note)}</span>`:""}</td><td>${esc(vol)}</td></tr>`).join("");
      s.body.appendChild(t);
    }
    s.body.appendChild(el("div","small", "Format circuit, 2-3 tours. " + esc(D.repos_sport||"")));
    s.body.appendChild(noteArea(label + ":sport:notes", "Notes séance (poids, reps réels, ressenti)…"));
    view.appendChild(s.box);

    s = sectionEl("ENCHAÎNEMENTS BOXE (entre les tours)", "blue");
    const bt = el("table");
    bt.innerHTML = "<tr><th>Niveau</th><th>Enchaînement</th><th>Notes</th></tr>" +
      (D.boxe||[]).map(([niv,ench,note]) => `<tr><td><b>${esc(niv)}</b></td><td>${esc(ench)}</td><td class="small">${esc(note)}</td></tr>`).join("");
    s.body.appendChild(bt);
    view.appendChild(s.box);
  } else if(label === "MERCREDI"){
    s = sectionEl("FORMATION DU JOUR — ANGLAIS 1h", "blue");
    s.body.appendChild(el("div","small","1 semaine du plan 10 semaines (voir Programme Anglais) + 10 min vocabulaire + 10 min écoute + 5-10 min écriture."));
    view.appendChild(s.box);
  } else if(label === "SAMEDI"){
    s = sectionEl("FORMATION DU JOUR — EXCEL 1h", "blue");
    s.body.appendChild(el("div","small","1 section du parcours (voir Programme Excel) — dans l'ordre, une par semaine."));
    view.appendChild(s.box);
  }

  // Checklist
  s = sectionEl("CHECKLIST DU JOUR");
  let groups;
  if(label === "DIMANCHE"){
    groups = [
      ["Matin", ["Étirements réveil","Eau + sel au réveil","Ginger shot","Meal prep de la semaine"]],
      ["Journée", ["Revue de semaine (To-Do, 3 priorités)","Préparer la semaine (sac, frigo)","Cheveux soignés (2-3x/semaine)"]],
      ["Soir", ["Jouer avec le chien","Repas avec Eva","Lecture 10 min","Yoga 5 min","Coucher visé 22h30"]],
    ];
  } else {
    const journee = ["3 priorités du jour avancées","Eau régulière (~2L dans la journée)","1 tâche To-Do avancée"];
    const soir = ["Jouer avec le chien","Repas avec Eva","Check Journal soir","Lecture 10 min","Yoga 5 min","Coucher visé 22h30 (7h30+ sommeil)"];
    if(label === "SAMEDI"){ journee.unshift("Courses de la semaine faites"); soir.push("Boxe libre / shadow boxing (option)"); }
    groups = [
      ["Matin", ["Étirements réveil","Eau + sel au réveil","Ginger shot","5 min soleil","Sport / formation fait(e)","Douche + dents","Cheveux soignés (2-3x/semaine)","Petit-déj / shaker (+whey/créatine si sport)","Check Journal matin"]],
      ["Journée", journee],
      ["Soir", soir],
    ];
  }
  groups.forEach(([grp, items]) => {
    s.body.appendChild(el("h4", null, grp.toUpperCase()));
    items.forEach((item,i) => {
      const c = el("div","check");
      const cb = el("input"); cb.type="checkbox"; cb.id="chk"+grp+i;
      const lb = el("label", null, esc(item)); lb.htmlFor = cb.id;
      c.appendChild(cb); c.appendChild(lb);
      bindCheck(cb, c, label + ":chk:" + grp + ":" + item);
      s.body.appendChild(c);
    });
  });
  view.appendChild(s.box);

  // Notes du soir — persistantes par jour
  s = sectionEl("NOTES / RESSENTI DU SOIR");
  const nightTa = el("textarea");
  nightTa.placeholder = "Ressenti, victoires, ce qui a coincé…";
  bindText(nightTa, label + ":notes-soir");
  s.body.appendChild(nightTa);
  view.appendChild(s.box);

  // Recettes du jour — toujours les 4 créneaux (matin/midi/soir/shaker) + rituel santé
  if(jourMenu){
    s = sectionEl("RECETTES DU JOUR", "sage");
    const [, pd, dej, din, shk] = jourMenu;
    const cards = [];
    [["Petit-déj",pd],["Déjeuner",dej],["Dîner",din],["Shaker",shk]].forEach(([slot,text]) => {
      const {name, detail} = resolveMeal(text);
      if(name){ cards.push([slot, name, detail || "Voir l'onglet Recettes du classeur."]); }
      else { cards.push([slot, slot + " du jour", detail]); }
    });
    if(gingerDetail) cards.push(["Rituel santé", gingerDetail[0], gingerDetail[1]]);
    const grid = el("div","grid2");
    cards.forEach(([slot,name,detail]) => {
      const c = el("div","card");
      c.innerHTML = `<div class="pill">${esc(slot)}</div><h4>${esc(name)}</h4><p>${esc(detail)}</p>`;
      grid.appendChild(c);
    });
    s.body.appendChild(grid);
    view.appendChild(s.box);
  }
}

function renderSemaine(){
  const view = document.getElementById("viewSemaine");
  view.innerHTML = "";

  const mantraWrap = el("div","mantra");
  mantraWrap.innerHTML = `
    <div class="icon">☀</div>
    <div class="label">État d'esprit de la semaine</div>
    <div class="quote">« ${esc(D.mantras[0])} »</div>
    <div class="meta"><b>Interdits :</b> ${esc(D.interdits.join(" · "))}<br><b>Identité visée :</b> ${esc(D.identite.join(" · "))}</div>`;
  view.appendChild(mantraWrap);

  let s = sectionEl("VUE D'ENSEMBLE", "blue");
  const t = el("table");
  t.innerHTML = "<tr><th>Jour</th><th>Sport / Formation</th><th>Point clé</th><th>Mantra</th></tr>" +
    D.overview.map(([jour,sf,pk],i) => `<tr><td><b>${esc(jour)}</b></td><td>${esc(sf)}</td><td class="small">${esc(pk)}</td><td class="small">« ${esc(D.mantras[i % D.mantras.length])} »</td></tr>`).join("");
  s.body.appendChild(t);
  s.body.appendChild(el("div","small","Cette semaine : 4 séances de sport (2 matin, 2 soir dont 1 optionnelle) · 2h de formation fixe (anglais mercredi, Excel samedi) · mercredi = seul jour sans sport."));
  view.appendChild(s.box);

  s = sectionEl("MENU DE LA SEMAINE", "sage");
  const mt = el("table");
  mt.innerHTML = "<tr><th>Jour</th><th>P-déj</th><th>Déj</th><th>Dîner</th><th>Shaker</th></tr>" +
    D.menu.map(([jour,pd,dej,din,shk]) => {
      const r = [pd,dej,din,shk].map(t => { const {name,detail} = resolveMeal(t); return esc(name||detail); });
      return `<tr><td><b>${esc(jour)}</b></td><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`;
    }).join("");
  s.body.appendChild(mt);
  view.appendChild(s.box);

  s = sectionEl("LISTE DE COURSES");
  const resetBtn = el("button", null, "Décocher tout (nouvelle semaine)");
  resetBtn.style.cssText = "margin-bottom:8px;padding:6px 12px;border:1px solid var(--hairline);border-radius:8px;background:var(--cream);color:var(--navy);font-size:12px;font-weight:600;font-family:inherit;";
  s.body.appendChild(resetBtn);
  const courseChecks = [];
  const byCat = {};
  (D.courses_semaine||[]).forEach(([cat,item,qte]) => { (byCat[cat] = byCat[cat]||[]).push([item,qte]); });
  Object.entries(byCat).forEach(([cat, items]) => {
    s.body.appendChild(el("h4", null, cat.toUpperCase()));
    items.forEach(([item,qte],i) => {
      const c = el("div","check");
      const cb = el("input"); cb.type="checkbox"; cb.id="course"+cat+i;
      const lb = el("label", null, `${esc(item)} <span class="small">— ${esc(qte)}</span>`); lb.htmlFor = cb.id;
      c.appendChild(cb); c.appendChild(lb);
      const key = "sem:course:" + cat + ":" + item;
      bindCheck(cb, c, key);
      courseChecks.push([cb, c, key]);
      s.body.appendChild(c);
    });
  });
  resetBtn.addEventListener("click", () => {
    courseChecks.forEach(([cb, c, key]) => { cb.checked = false; c.classList.remove("done"); store.setItem("SV:" + key, "0"); });
  });
  s.body.appendChild(noteArea("sem:courses:notes", "À ajouter à la liste…"));
  view.appendChild(s.box);

  s = sectionEl("SPORT DE LA SEMAINE", "blue");
  const st = el("table");
  let rowsHtml = "<tr><th>Jour</th><th>Horaire</th><th>Exercice</th><th>Volume</th></tr>";
  Object.entries(PAYLOAD.sportDayMap).forEach(([jour, splitTitle]) => {
    const exs = (D.split||[]).find(x => x[0] === splitTitle);
    if(!exs) return;
    const muscle = splitTitle.includes(" — ") ? splitTitle.split(" — ")[1] : splitTitle;
    exs[1].forEach(([ex,vol], i) => {
      rowsHtml += `<tr><td>${i===0?`<b>${esc(jour)}</b><br><span class="small">${esc(muscle)}</span>`:""}</td><td class="small">${i===0?esc(PAYLOAD.sportHoraire[jour]||""):""}</td><td>${esc(ex)}</td><td>${esc(vol)}</td></tr>`;
    });
  });
  st.innerHTML = rowsHtml;
  s.body.appendChild(st);
  s.body.appendChild(el("div","small","Format circuit, 2-3 tours. Matériel à préparer avant : " + esc(D.materiel_sport||"")));
  s.body.appendChild(noteArea("sem:sport:notes", "Notes sport de la semaine (progression, douleurs, ajustements)…"));
  view.appendChild(s.box);

  s = sectionEl("FORMATION EN COURS", "coral");
  s.body.appendChild(el("div","small","<b>Anglais</b> — 1h fixe mercredi soir + trajets. Plan 10 semaines : voir « Programme Anglais »."));
  s.body.appendChild(el("div","small","<b>Excel</b> — 1h fixe samedi matin. Parcours par sections : voir « Programme Excel »."));
  s.body.appendChild(el("div","small","<b>Sylob</b> — au poste, cas réels. Plan 4 semaines dès la reprise (27/07) : voir « Programme Sylob »."));
  view.appendChild(s.box);

  s = sectionEl("ÉCARTS PRÉVUS & RÈGLES DU JEU");
  const lines = (D.ecarts + ". " + D.regles).split(". ").map(l=>l.trim()).filter(Boolean);
  s.body.innerHTML = lines.map(l => `<div class="small" style="padding:3px 0">• ${esc(l)}${l.endsWith(".")?"":"."}</div>`).join("");
  view.appendChild(s.box);

  s = sectionEl("NOTES DE LA SEMAINE / REVUE DU DIMANCHE");
  const revTa = el("textarea");
  revTa.placeholder = "Bilan de la semaine, priorités de la suivante, idées…";
  revTa.style.minHeight = "100px";
  bindText(revTa, "sem:revue");
  s.body.appendChild(revTa);
  view.appendChild(s.box);
}

// --- init ---
const picker = document.getElementById("dayPicker");
DAY_ORDER.forEach(label => {
  const opt = document.createElement("option");
  opt.value = label; opt.textContent = DAY_LABEL[label];
  picker.appendChild(opt);
});
const today = todayLabel();
picker.value = today;
document.getElementById("headerSub").textContent = "Aujourd'hui : " + DAY_LABEL[today];
picker.addEventListener("change", () => renderJour(picker.value));

const tabJourBtn = document.getElementById("tabBtnJour");
const tabSemaineBtn = document.getElementById("tabBtnSemaine");
tabJourBtn.addEventListener("click", () => {
  tabJourBtn.classList.add("active"); tabSemaineBtn.classList.remove("active");
  document.getElementById("viewJour").style.display = "";
  document.getElementById("viewSemaine").style.display = "none";
});
tabSemaineBtn.addEventListener("click", () => {
  tabSemaineBtn.classList.add("active"); tabJourBtn.classList.remove("active");
  document.getElementById("viewSemaine").style.display = "";
  document.getElementById("viewJour").style.display = "none";
});

renderJour(today);
renderSemaine();
</script>
</body>
</html>
